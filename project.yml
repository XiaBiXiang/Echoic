name: Echoic
options:
  bundleIdPrefix: com.echoic
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Echoic:
    type: application
    platform: macOS
    sources:
      - path: Echoic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echoic.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: "Echoic"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 Echoic. All rights reserved."
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Echoic/Echoic.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
